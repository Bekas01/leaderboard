<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Лидерборд продаж</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.07);
      --card-shadow-gold: 0 4px 20px rgba(234,179,8,0.18);
      --gold: #eab308;
      --gold-bg: #fefce8;
      --gold-border: #fde047;
      --silver: #94a3b8;
      --silver-bg: #f1f5f9;
      --bronze: #d97706;
      --bronze-bg: #fffbeb;
      --green: #059669;
      --green-bg: #ecfdf5;
      --text: #0f172a;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --accent: #6366f1;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 32px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 32px;
    }

    .header-left h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .header-left p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .plan-box { text-align: right; }
    .plan-box .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .plan-box .amount {
      font-size: 2rem;
      font-weight: 800;
      color: var(--green);
    }

    /* === BOARD — позиционирование для анимации === */
    .board {
      position: relative;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card);
      border-radius: 20px;
      padding: 16px 24px;
      border: 2px solid var(--border);
      box-shadow: var(--card-shadow);
      position: relative;
      /* плавное перемещение через top */
      transition: top 0.7s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.3s ease,
                  border-color 0.3s ease;
      margin-bottom: 12px;
    }

    .row.rank-1 {
      border-color: var(--gold-border);
      box-shadow: var(--card-shadow-gold);
    }

    /* подсветка строки при движении вверх */
    .row.moving-up {
      box-shadow: 0 0 0 3px var(--accent), 0 8px 30px rgba(99,102,241,0.25);
      z-index: 10;
    }

    .rank-badge {
      position: absolute;
      top: -12px;
      left: -10px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: background 0.5s ease;
    }

    .rank-1 .rank-badge { background: var(--gold); }
    .rank-2 .rank-badge { background: var(--silver); }
    .rank-3 .rank-badge { background: var(--bronze); }
    .rank-other .rank-badge { background: #cbd5e1; color: #475569; }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      flex-shrink: 0;
      overflow: hidden;
      transition: background 0.5s, color 0.5s;
    }

    .rank-1 .avatar { background: var(--gold-bg); color: var(--gold); }
    .rank-2 .avatar { background: var(--silver-bg); color: var(--silver); }
    .rank-3 .avatar { background: var(--bronze-bg); color: var(--bronze); }
    .rank-other .avatar { background: #f1f5f9; color: #94a3b8; }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .rank-2, .rank-3, .rank-other { margin-left: 16px; }

    .info { flex: 1; }
    .info .name { font-weight: 700; font-size: 1.05rem; color: var(--text); }
    .rank-1 .info .name { font-size: 1.2rem; }
    .info .deals { font-size: 0.8rem; color: var(--text-secondary); margin-top: 3px; }

    .total { font-weight: 800; text-align: right; color: var(--text); transition: color 0.5s; }
    .rank-1 .total { font-size: 1.6rem; }
    .rank-2 .total, .rank-3 .total { font-size: 1.25rem; color: #334155; }
    .rank-other .total { font-size: 1.1rem; color: #475569; }

    .progress-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--border);
      border-radius: 0 0 18px 18px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      border-radius: 0 0 18px 18px;
      background: var(--accent);
      transition: width 1.2s ease;
    }

    .rank-1 .progress-bar { background: var(--gold); }
    .rank-2 .progress-bar { background: var(--silver); }
    .rank-3 .progress-bar { background: var(--bronze); }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* === POPUP === */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.35);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .popup-overlay.active { opacity: 1; pointer-events: all; }

    .popup {
      background: #fff;
      border-radius: 28px;
      padding: 44px 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      border-top: 6px solid var(--green);
      transform: scale(0.85) translateY(30px);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .popup-overlay.active .popup { transform: scale(1) translateY(0); }

    .popup-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .popup h2 { font-size: 1.8rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .popup .manager-name { color: var(--text-secondary); font-size: 1rem; margin-bottom: 24px; }

    .popup-amount {
      background: var(--green-bg);
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .popup-amount .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--green);
      font-weight: 700;
      margin-bottom: 10px;
    }
    .popup-amount .value { font-size: 3.2rem; font-weight: 900; color: var(--green); line-height: 1; }
    .popup-footer { font-size: 0.88rem; color: var(--text-secondary); }

    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
    }

    .demo-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(99,102,241,0.35);
      transition: opacity 0.2s, transform 0.1s;
      z-index: 200;
    }
    .demo-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>🏆 Рейтинг продаж</h1>
      <p>
        <span class="status-dot"></span>
        <span id="current-month"></span> &nbsp;•&nbsp; Обновляется в реальном времени
      </p>
    </div>
    <div class="plan-box">
      <div class="label">План отдела</div>
      <div class="amount" id="plan-display">—</div>
    </div>
  </div>

  <div class="board" id="board">
    <p style="color:#94a3b8;text-align:center;padding:40px 0">Загрузка...</p>
  </div>
</div>

<div class="popup-overlay" id="popup">
  <div class="popup">
    <div class="popup-icon">💸</div>
    <h2>Новая продажа!</h2>
    <p class="manager-name" id="popup-manager">—</p>
    <div class="popup-amount">
      <div class="label">Сумма чека</div>
      <div class="value" id="popup-value">—</div>
    </div>
    <p class="popup-footer">🔥 Так держать! Движемся к цели.</p>
  </div>
</div>

<button class="demo-btn" onclick="simulateSale()">⚡ Симуляция продажи</button>

<script>
  const SUPABASE_URL      = 'https://httlwebnzuhytqpoyjvt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0dGx3ZWJuenVoeXRxcG95anZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzUyNzUsImV4cCI6MjA5NzgxMTI3NX0.hzlIfomYy0YG1Blwgl9RafA1l0EJX7mGmKyydeaiJCw';
  const PLAN_AMOUNT       = 8_450_000;
  const ROW_HEIGHT        = 88; // высота строки + gap в пикселях

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.getElementById('current-month').textContent =
    new Date().toLocaleString('ru', { month: 'long', year: 'numeric' });
  document.getElementById('plan-display').textContent = fmt(PLAN_AMOUNT);

  function fmt(n) { return new Intl.NumberFormat('ru-KZ').format(n) + ' ₸'; }

  function pluralDeals(n) {
    if (n % 10 === 1 && n % 100 !== 11) return 'успешная сделка';
    if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'успешные сделки';
    return 'успешных сделок';
  }

  function rankClass(i) {
    if (i === 0) return 'rank-1';
    if (i === 1) return 'rank-2';
    if (i === 2) return 'rank-3';
    return 'rank-other';
  }

  let managers = [];
  let isAnimating = false;

  // ── ПЕРВАЯ ЗАГРУЗКА — просто рисуем без анимации ──
  async function loadManagers() {
    const { data, error } = await db
      .from('managers')
      .select('*')
      .order('total_amount', { ascending: false });
    if (error) { console.error(error); return; }
    managers = data || [];
    renderBoardStatic(managers);
  }

  function renderBoardStatic(list) {
    const board = document.getElementById('board');
    board.innerHTML = '';
    board.style.height = '';
    list.forEach((m, i) => {
      const row = createRow(m, i);
      board.appendChild(row);
    });
  }

  function createRow(m, i) {
    const cls  = rankClass(i);
    const pct  = Math.min(100, Math.round((m.total_amount / PLAN_AMOUNT) * 100));
    const init = m.initials || m.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const row  = document.createElement('div');
    row.className = `row ${cls}`;
    row.dataset.id = m.id;
    row.innerHTML = `
      <div class="rank-badge">${i + 1}</div>
      <div class="avatar">${m.photo_url ? `<img src="${m.photo_url}" alt="${m.name}">` : init}</div>
      <div class="info">
        <div class="name">${m.name}</div>
        <div class="deals">${m.deals_count} ${pluralDeals(m.deals_count)}</div>
      </div>
      <div class="total">${fmt(m.total_amount)}</div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    `;
    return row;
  }

  // ── АНИМИРОВАННОЕ ОБНОВЛЕНИЕ ──
  // Шаг 1: конфетти + попап (5 сек)
  // Шаг 2: закрываем попап → анимируем перемещение строк
  async function animatedUpdate(changedManagerId, newData) {
    if (isAnimating) return;
    isAnimating = true;

    const oldOrder = [...managers]; // старый порядок
    managers = newData;             // новый порядок

    // найти менеджера который вырос
    const changedMgr = newData.find(m => m.id === changedManagerId);
    const oldIndex   = oldOrder.findIndex(m => m.id === changedManagerId);
    const newIndex   = newData.findIndex(m => m.id === changedManagerId);

    // ШАГ 1: показать попап + конфетти
    const sale = pendingSale;
    if (sale && changedMgr) {
      showPopup(changedMgr.name, sale.amount);
      playSound();
      launchConfetti();
    }

    // ШАГ 2: через 3.5 сек закрыть попап и анимировать таблицу
    await sleep(3500);
    document.getElementById('popup').classList.remove('active');

    await sleep(300); // небольшая пауза после закрытия попапа

    if (oldIndex !== newIndex && oldIndex > newIndex) {
      // менеджер поднялся — анимируем
      await animateReorder(oldOrder, newData, changedManagerId);
    } else {
      // просто обновляем цифры без перемещения
      renderBoardStatic(newData);
    }

    isAnimating = false;
    pendingSale = null;
  }

  // Плавное перемещение строк через абсолютное позиционирование
  async function animateReorder(oldOrder, newOrder, movedId) {
    const board = document.getElementById('board');
    const rows  = Array.from(board.querySelectorAll('.row'));

    // зафиксировать высоту board чтобы не прыгал
    const totalH = rows.reduce((s, r) => s + r.offsetHeight + 12, 0);
    board.style.height = totalH + 'px';

    // перевести все строки в absolute с текущими позициями
    let currentTop = 0;
    const positions = {}; // id -> top
    rows.forEach(r => {
      const h = r.offsetHeight;
      positions[r.dataset.id] = currentTop;
      r.style.position = 'absolute';
      r.style.width    = '100%';
      r.style.top      = currentTop + 'px';
      r.style.transition = 'none';
      currentTop += h + 12;
    });

    // подсветить поднимающуюся строку
    const movedRow = board.querySelector(`[data-id="${movedId}"]`);
    if (movedRow) movedRow.classList.add('moving-up');

    await sleep(50); // дать браузеру применить позиции

    // включить transition и установить новые позиции
    let newTop = 0;
    newOrder.forEach((m, i) => {
      const row = board.querySelector(`[data-id="${m.id}"]`);
      if (!row) return;
      row.style.transition = 'top 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
      row.style.top = newTop + 'px';
      newTop += row.offsetHeight + 12;
    });

    await sleep(900); // ждём конца анимации

    // убрать подсветку и перерисовать нормально
    if (movedRow) movedRow.classList.remove('moving-up');
    renderBoardStatic(newOrder);
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ── REALTIME ──
  let pendingSale = null;

  db.channel('managers-rt')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'managers' }, async () => {
      if (isAnimating) return;
      const { data } = await db
        .from('managers')
        .select('*')
        .order('total_amount', { ascending: false });
      if (!data) return;
      const changedId = pendingSale ? pendingSale.manager_id : null;
      await animatedUpdate(changedId, data);
    })
    .subscribe();

  db.channel('sales-rt')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sales' }, (payload) => {
      pendingSale = payload.new;
    })
    .subscribe();

  // ── ПОПАП ──
  function showPopup(name, amount) {
    document.getElementById('popup-manager').textContent = name + ' только что закрыл сделку';
    document.getElementById('popup-value').textContent   = '+' + fmt(amount);
    document.getElementById('popup').classList.add('active');
  }

  // ── ЗВУК ──
  function playSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [523, 659, 784, 1047].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq; osc.type = 'sine';
        const t = ctx.currentTime + i * 0.12;
        gain.gain.setValueAtTime(0.28, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
        osc.start(t); osc.stop(t + 0.5);
      });
    } catch(e) {}
  }

  // ── КОНФЕТТИ ──
  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors  = ['#eab308','#059669','#6366f1','#f43f5e','#38bdf8','#f97316'];
    const pieces  = Array.from({ length: 150 }, () => ({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 200,
      w: 8 + Math.random() * 9,
      h: 5 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 5,
      vy: 2 + Math.random() * 4,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 9,
    }));
    let raf;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      pieces.forEach(p => {
        if (p.y > canvas.height + 20) return;
        alive = true;
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.angle += p.spin;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle * Math.PI / 180);
        ctx.globalAlpha = Math.max(0, 1 - p.y / (canvas.height * 0.95));
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      });
      if (alive) raf = requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    if (raf) cancelAnimationFrame(raf);
    draw();
  }

  // ── СИМУЛЯЦИЯ ──
  async function simulateSale() {
    if (isAnimating || !managers.length) return;
    const mgr    = managers[Math.floor(Math.random() * managers.length)];
    const amount = (Math.floor(Math.random() * 9) + 1) * 50000;
    pendingSale  = { manager_id: mgr.id, amount };
    await db.from('sales').insert({ manager_id: mgr.id, amount });
    await db.from('managers').update({
      total_amount: mgr.total_amount + amount,
      deals_count:  mgr.deals_count + 1
    }).eq('id', mgr.id);
  }

  loadManagers();
</script>
</body>
</html>
